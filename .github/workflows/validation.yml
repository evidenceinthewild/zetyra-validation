name: Validation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    name: Python Validation Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GSD Python tests
        run: |
          cd gsd
          python test_hptn083.py
          python test_heartmate.py

      - name: Run CUPED tests
        run: |
          cd cuped
          python test_analytical.py

      - name: Run Bayesian tests
        run: |
          cd bayesian
          python test_beta_binomial.py
          python test_normal_conjugate.py

  r-tests:
    runs-on: ubuntu-latest
    name: R Validation Tests (gsDesign)

    env:
      # Pin the user library path before setup-r runs so the cache key
      # and install target resolve consistently. Previously this was
      # left implicit and the cache path expanded to empty string at
      # YAML-expansion time, leaving install.packages() and library()
      # operating on different directories.
      R_LIBS_USER: ${{ github.workspace }}/.r-libs

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Create R library directory
        run: mkdir -p "$R_LIBS_USER"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-4.3-${{ hashFiles('.github/workflows/validation.yml') }}
          restore-keys: r-${{ runner.os }}-4.3-

      - name: Install R packages
        run: |
          Rscript -e '
            .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()));
            for (pkg in c("gsDesign", "httr", "jsonlite")) {
              if (!requireNamespace(pkg, quietly = TRUE)) {
                install.packages(pkg, lib = Sys.getenv("R_LIBS_USER"))
              } else {
                cat(sprintf("%s already installed\n", pkg))
              }
            }
          '

      - name: Verify R packages
        run: |
          Rscript -e '
            .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()));
            library(gsDesign);
            library(httr);
            library(jsonlite);
            cat("All packages loaded successfully\n")
          '

      - name: Run GSD R benchmark
        run: |
          cd gsd
          Rscript test_gsdesign_benchmark.R
